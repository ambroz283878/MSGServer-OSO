{% extends "base.html" %}

{% block title %}Witaj, {{ USER }}{% endblock %}

{% block header_user %}
<div class="text-sm font-medium">{{ USER }}</div>
<div class="text-xs text-green-400">Status: online</div>
<a href="{{ url_for('logout') }}" class="text-xs text-zinc-400 hover:text-zinc-200">Wyloguj się</a>
{% endblock %}

{% block content %}
<div class="flex justify-center items-center py-80">
  <div class="bg-zinc-600/70 border-2 border-zinc-200/80 rounded-3xl p-8 flex flex-col items-center gap-4">
    <h1 class="text-white font-bold text-xl">Zalogowano jako {{ USER }}</h1>
    <a href="{{ url_for('message') }}">
      <button class="w-48 h-10 bg-indigo-700 hover:bg-indigo-600 rounded-xl text-white font-bold transition">
        <i class="fa-solid fa-inbox mr-2"></i>Skrzynka
      </button>
    </a>
    <a href="{{ url_for('logout') }}">
      <button class="w-48 h-10 bg-zinc-700 hover:bg-zinc-600 rounded-xl text-white font-bold transition">
        Wyloguj się
      </button>
    </a>
  </div>
</div>
{% endblock %}
