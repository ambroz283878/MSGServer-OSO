{% extends "base.html" %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="flex justify-center items-center py-80">
  <div class="bg-zinc-600/70 border-2 border-zinc-200/80 rounded-3xl p-8 flex justify-center items-center">
    <form action="{{ url_for('login') }}" method="POST">

      <input name="user" type="text" value="{{ PREV_USERNAME }}" placeholder="Nazwa użytkownika"
        class="w-full h-9 bg-zinc-300 border-2 border-zinc-600 rounded-xl text-zinc-600 font-bold py-2 my-3 px-2">
      {% if USERNAME_ERR %}
        <p class="text-xs text-red-400 -mt-2 mb-2">{{ USERNAME_ERR }}</p>
      {% endif %}

      <input name="passwd" type="password" placeholder="Hasło"
        class="w-full h-9 bg-zinc-300 border-2 border-zinc-600 rounded-xl text-zinc-600 font-bold py-2 my-3 px-2">
      {% if PASSWD_ERR %}
        <p class="text-xs text-red-400 -mt-2 mb-2">{{ PASSWD_ERR }}</p>
      {% endif %}

      <input type="submit" value="Zaloguj się"
        class="w-full h-9 bg-gradient-to-br from-indigo-800 via-blue-800 to-indigo-800 rounded-xl text-white font-bold py-2 mt-4 cursor-pointer">

      <p class="text-xs text-zinc-400 text-center mt-4">
        Nie masz konta? <a href="{{ url_for('register') }}" class="text-indigo-400 hover:underline">Zarejestruj się</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
